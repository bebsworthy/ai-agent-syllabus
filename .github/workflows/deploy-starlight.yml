name: Deploy Starlight to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: starlight/package-lock.json

      - name: Install Node dependencies
        working-directory: starlight
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate docs from source
        run: python scripts/build_starlight.py

      - name: Build Starlight site
        working-directory: starlight
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: starlight/dist/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
